<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Promptimizer">
<meta name="theme-color" content="#7c9ef8">
<link rel="manifest" href="manifest.json">

<title>Promptimizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; min-height: 100vh; min-height: -webkit-fill-available; }

/* Layout */
.app { display: flex; height: 100vh; height: -webkit-fill-available; }
.sidebar { width: 260px; min-width: 260px; background: #111; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; transition: transform 0.25s ease; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Mobile overlay sidebar */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
@media (max-width: 680px) {
  .sidebar { position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transform: translateX(-100%); width: 290px; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  .mobile-menu-btn { display: flex !important; }
}

.sidebar-header { padding: 1rem; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 8px; }
.sidebar-header h1 { font-size: 14px; font-weight: 700; color: #7c9ef8; letter-spacing: 0.05em; text-transform: uppercase; flex: 1; }
.sidebar-tabs { display: flex; border-bottom: 1px solid #2a2a2a; }
.tab-btn { flex: 1; padding: 9px; font-size: 12px; background: none; border: none; color: #666; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; font-family: inherit; }
.tab-btn.active { color: #7c9ef8; border-bottom-color: #7c9ef8; }
.sidebar-content { flex: 1; overflow-y: auto; padding: 0.75rem; }
.sidebar-footer { padding: 0.75rem; border-top: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 6px; }

/* Category list */
.cat-item { border-radius: 6px; margin-bottom: 2px; border: 1px solid transparent; transition: background 0.1s; }
.cat-item:hover { background: #1e1e1e; }
.cat-header { display: flex; align-items: center; gap: 8px; padding: 6px 8px; cursor: pointer; }
.cat-toggle { width: 15px; height: 15px; border: 1px solid #444; border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; color: transparent; transition: all 0.15s; }
.cat-toggle.on { background: #7c9ef8; border-color: #7c9ef8; color: #fff; }
.cat-name { font-size: 13px; flex: 1; color: #ccc; user-select: none; }
.cat-count { font-size: 11px; color: #555; }
.cat-chevron { font-size: 10px; color: #444; transition: transform 0.2s; }
.cat-item.expanded .cat-chevron { transform: rotate(90deg); }

/* Prompt toggles inside category */
.cat-prompts { display: none; padding: 0 8px 8px 8px; }
.cat-item.expanded .cat-prompts { display: block; }
.prompt-toggle-row { display: flex; align-items: flex-start; gap: 6px; padding: 4px 0; border-bottom: 1px solid #1e1e1e; }
.prompt-toggle-row:last-child { border-bottom: none; }
.prompt-chk { width: 13px; height: 13px; border: 1px solid #444; border-radius: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; color: transparent; cursor: pointer; margin-top: 2px; transition: all 0.15s; }
.prompt-chk.on { background: #4a7a4a; border-color: #4a7a4a; color: #fff; }
.prompt-short { font-size: 11px; color: #666; line-height: 1.4; cursor: pointer; flex: 1; }
.prompt-short.on { color: #999; }

.toggle-all-row { display: flex; gap: 6px; margin-bottom: 0.5rem; }

/* Main header */
.main-header { padding: 0.75rem 1rem; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.main-header h2 { font-size: 13px; font-weight: 500; color: #777; flex: 1; }
.mobile-menu-btn { display: none; background: none; border: 1px solid #333; border-radius: 6px; color: #aaa; padding: 5px 9px; font-size: 16px; cursor: pointer; }
.main-body { flex: 1; overflow-y: auto; padding: 1rem; -webkit-overflow-scrolling: touch; }

/* Cooldown bar */
.cooldown-bar { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; margin-bottom: 10px; }
.cooldown-bar label { font-size: 12px; color: #888; white-space: nowrap; }
.cooldown-bar input[type=range] { flex: 1; accent-color: #7c9ef8; height: 4px; cursor: pointer; }
.cooldown-val { font-size: 13px; font-weight: 600; color: #7c9ef8; min-width: 22px; text-align: center; }
.cooldown-bar span.unit { font-size: 11px; color: #555; }

/* Custom end text */
.custom-end-bar { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; margin-bottom: 10px; }
.custom-end-bar textarea { flex: 1; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px; color: #ddd; font-size: 12px; padding: 6px 8px; resize: none; font-family: inherit; min-height: 44px; line-height: 1.5; }
.custom-end-bar textarea:focus { outline: none; border-color: #7c9ef8; }
.custom-end-bar label { font-size: 11px; color: #888; white-space: nowrap; margin-top: 4px; }
.toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; margin-top: 4px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-switch .slider { position: absolute; inset: 0; background: #333; border-radius: 20px; cursor: pointer; transition: 0.2s; }
.toggle-switch .slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #888; border-radius: 50%; transition: 0.2s; }
.toggle-switch input:checked + .slider { background: #7c9ef8; }
.toggle-switch input:checked + .slider:before { transform: translateX(16px); background: #fff; }

/* Gen button */
.gen-btn { width: 100%; padding: 13px; font-size: 15px; font-weight: 600; background: #7c9ef8; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.15s; font-family: inherit; }
.gen-btn:hover { background: #6b8ef0; }
.gen-btn:active { background: #5a7ee8; transform: scale(0.99); }

/* Output */
.output-box { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 1rem; margin-top: 10px; display: none; }
.output-picks { margin-bottom: 0.75rem; display: flex; flex-direction: column; gap: 5px; }
.pick-row { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }
.pick-label { font-size: 10px; padding: 2px 6px; background: #1e2a3a; color: #7c9ef8; border-radius: 4px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
.pick-text { font-size: 12px; color: #777; line-height: 1.5; flex: 1; min-width: 0; }
.output-label { font-size: 10px; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.output-textarea { width: 100%; min-height: 130px; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px; color: #e0e0e0; font-size: 13px; line-height: 1.6; padding: 0.75rem; resize: vertical; font-family: inherit; }
.output-actions { display: flex; gap: 8px; margin-top: 8px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 7px 13px; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid #333; background: #1e1e1e; color: #ccc; transition: all 0.1s; font-family: inherit; }
.btn:hover { background: #2a2a2a; color: #fff; }
.btn.primary { background: #7c9ef8; border-color: #7c9ef8; color: #fff; }
.btn.primary:hover { background: #6b8ef0; }
.btn.danger { border-color: #5a2a2a; color: #cc5555; }
.btn.danger:hover { background: #2a1a1a; }

/* Editor */
.editor-section { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
.editor-section h3 { font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 0.75rem; }
.prompt-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
.prompt-item textarea { flex: 1; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px; color: #ddd; font-size: 12px; padding: 6px 8px; line-height: 1.5; resize: vertical; font-family: inherit; min-height: 52px; }
.prompt-item textarea:focus { outline: none; border-color: #7c9ef8; }
.del-btn { background: none; border: 1px solid #3a2a2a; color: #884444; padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: 12px; flex-shrink: 0; margin-top: 2px; }
.del-btn:hover { background: #2a1a1a; color: #cc5555; }

/* Bulk add */
.bulk-area { width: 100%; min-height: 80px; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px; color: #ddd; font-size: 12px; padding: 8px; resize: vertical; font-family: inherit; line-height: 1.5; }
.bulk-area:focus { outline: none; border-color: #7c9ef8; }
.bulk-row { display: flex; gap: 8px; align-items: flex-start; margin-top: 8px; }

input[type="text"] { background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px; color: #ddd; font-size: 13px; padding: 7px 10px; font-family: inherit; }
input[type="text"]:focus { outline: none; border-color: #7c9ef8; }

.new-cat-row { display: flex; gap: 8px; align-items: center; }
.divider { border: none; border-top: 1px solid #2a2a2a; margin: 0.75rem 0; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; }

.saved-toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #2a4a2a; border: 1px solid #3a6a3a; color: #6aaa6a; padding: 8px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
.saved-toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="saved-toast" id="toast">Saved ✓</div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Promptimizer</h1>
      <button class="btn" style="padding:4px 8px;font-size:11px;" onclick="closeSidebar()" id="close-sidebar-btn">✕</button>
    </div>
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="showTab('randomize',this)">Randomize</button>
      <button class="tab-btn" onclick="showTab('edit',this)">Edit Library</button>
    </div>
    <div class="sidebar-content">
      <div class="toggle-all-row">
        <button class="btn" style="flex:1;" onclick="toggleAll(true)">All</button>
        <button class="btn" style="flex:1;" onclick="toggleAll(false)">None</button>
      </div>
      <div id="cat-list"></div>
    </div>
    <div class="sidebar-footer">
      <button class="btn" onclick="exportJSON()">⬇ Export JSON</button>
      <label class="btn" style="justify-content:center;cursor:pointer;">
        ⬆ Import JSON
        <input type="file" accept=".json" style="display:none;" onchange="importJSON(event)">
      </label>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
      <h2 id="main-title">Randomize prompts</h2>
      <button class="btn primary" id="save-html-btn" onclick="saveAsHTML()" style="display:none;font-size:11px;padding:5px 10px;">💾 Save as HTML</button>
    </div>
    <div class="main-body">

      <!-- Randomize panel -->
      <div id="panel-randomize">
        <!-- Cooldown -->
        <div class="cooldown-bar">
          <label>Cooldown</label>
          <input type="range" min="1" max="10" value="5" id="cooldown-slider" oninput="cooldownLength=+this.value;document.getElementById('cooldown-val').textContent=this.value">
          <span class="cooldown-val" id="cooldown-val">5</span>
          <span class="unit">gens</span>
          <button class="btn" style="font-size:11px;padding:4px 8px;" onclick="resetCooldown()">Reset</button>
        </div>

        <!-- Custom end text -->
        <div class="custom-end-bar">
          <div style="display:flex;flex-direction:column;gap:4px;align-items:center;">
            <label style="font-size:10px;color:#666;text-align:center;">Add<br>text</label>
            <label class="toggle-switch">
              <input type="checkbox" id="custom-end-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>
          <textarea id="custom-end-text" placeholder="Custom text to append to every prompt..."></textarea>
        </div>

        <button class="gen-btn" onclick="generatePrompt()">🎲 Generate random prompt</button>

        <div class="output-box" id="output-box">
          <div class="output-picks" id="output-picks"></div>
          <hr class="divider">
          <div class="output-label">Combined prompt</div>
          <textarea class="output-textarea" id="output-text" readonly></textarea>
          <div class="output-actions">
            <button class="btn primary" id="copy-btn" onclick="copyPrompt()" style="flex:1;">Copy</button>
            <button class="btn" onclick="generatePrompt()" style="flex:1;">↺ Regenerate</button>
          </div>
        </div>
      </div>

      <!-- Edit panel -->
      <div id="panel-edit" style="display:none;">
        <div class="editor-section">
          <h3>Add new category</h3>
          <div class="new-cat-row">
            <input type="text" id="new-cat-name" placeholder="Category name..." style="flex:1;">
            <button class="btn primary" onclick="addCategory()">+ Add</button>
          </div>
        </div>
        <div id="editor-cats"></div>
      </div>

    </div>
  </div>
</div>

const CONSISTENCY = 'The character must remain absolutely identical to the original in every detail — face, facial structure, hair color, hair style, body proportions, physique, breast size, fitness level, clothing, and all anatomical features. Total character consistency across every aspect of their appearance, exactly as they appear in the source image.';

// ── State ─────────────────────────────────────────────────────────
let data = {};
let activeCategories = {};
let disabledPrompts = {}; // key: 'cat::index', value: true
let cooldownLength = 5;
let cooldownMap = {};
let genCount = 0;

// ── Persistence ───────────────────────────────────────────────────
function saveState() {
  try {
    localStorage.setItem('promptimizer_data', JSON.stringify(data));
    localStorage.setItem('promptimizer_cats', JSON.stringify(activeCategories));
    localStorage.setItem('promptimizer_disabled', JSON.stringify(disabledPrompts));
  } catch(e) {}
}

function loadState() {
  try {
    const d = localStorage.getItem('promptimizer_data');
    const c = localStorage.getItem('promptimizer_cats');
    const dp = localStorage.getItem('promptimizer_disabled');
    if (d) data = JSON.parse(d); else data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    if (c) activeCategories = JSON.parse(c);
    else { activeCategories = {}; Object.keys(data).forEach(k => activeCategories[k] = true); }
    if (dp) disabledPrompts = JSON.parse(dp); else disabledPrompts = {};
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    activeCategories = {};
    Object.keys(data).forEach(k => activeCategories[k] = true);
    disabledPrompts = {};
  }
}

function renderCatList() {
  const el = document.getElementById('cat-list');
  el.innerHTML = '';
  Object.keys(data).forEach(cat => {
    const enabledCount = data[cat].filter((_, i) => !disabledPrompts[cat + '::' + i]).length;
    const item = document.createElement('div');
    item.className = 'cat-item';
    item.id = 'catitem-' + btoa(encodeURIComponent(cat)).replace(/=/g,'');

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <div class="cat-toggle ${activeCategories[cat] ? 'on' : ''}" onclick="toggleCat('${cat.replace(/'/g,"\\'")}',event)">✓</div>
      <span class="cat-name">${cat}</span>
      <span class="cat-count">${enabledCount}/${data[cat].length}</span>
      <span class="cat-chevron">▶</span>
    `;
    header.onclick = (e) => {
      if (e.target.classList.contains('cat-toggle')) return;
      item.classList.toggle('expanded');
    };

    const promptsDiv = document.createElement('div');
    promptsDiv.className = 'cat-prompts';
    data[cat].forEach((p, i) => {
      const key = cat + '::' + i;
      const enabled = !disabledPrompts[key];
      const row = document.createElement('div');
      row.className = 'prompt-toggle-row';
      row.innerHTML = `
        <div class="prompt-chk ${enabled ? 'on' : ''}" onclick="togglePrompt('${cat.replace(/'/g,"\\'")}',${i})">✓</div>
        <span class="prompt-short ${enabled ? 'on' : ''}">${p.substring(0, 60)}${p.length > 60 ? '…' : ''}</span>
      `;
      promptsDiv.appendChild(row);
    });

    item.appendChild(header);
    item.appendChild(promptsDiv);
    el.appendChild(item);
  });
}

function toggleCat(cat, e) {
  e.stopPropagation();
  activeCategories[cat] = !activeCategories[cat];
  saveState();
  renderCatList();
}

function togglePrompt(cat, i) {
  const key = cat + '::' + i;
  disabledPrompts[key] = !disabledPrompts[key];
  if (!disabledPrompts[key]) delete disabledPrompts[key];
  saveState();
  renderCatList();
}

function toggleAll(state) {
  Object.keys(data).forEach(k => activeCategories[k] = state);
  saveState();
  renderCatList();
}

// ── Generate ──────────────────────────────────────────────────────
function stripSuffix(text) {
  return text.replace(/[\s.,]*everything else stays the same\.?/gi, '').trim().replace(/\.$/, '');
}

function resetCooldown() {
  cooldownMap = {};
  genCount = 0;
}

function generatePrompt() {
  genCount++;
  const selected = Object.keys(data).filter(k => activeCategories[k]);
  if (selected.length === 0) { alert('Enable at least one category.'); return; }

  const picks = [];
  const pickDetails = [];

  for (const cat of selected) {
    const pool = data[cat]
      .map((p, i) => ({ p, i }))
      .filter(({ i }) => !disabledPrompts[cat + '::' + i]);
    if (pool.length === 0) continue;

    const available = pool.filter(({ i }) => {
      const lastUsed = cooldownMap[cat + '::' + i];
      return lastUsed === undefined || (genCount - lastUsed) > cooldownLength;
    });

    let chooseFrom;
    if (available.length > 0) {
      chooseFrom = available;
    } else {
      // All on cooldown — pick least recently used so we never repeat the same one
      const sorted = pool.slice().sort((a, b) => {
        const la = cooldownMap[cat + '::' + a.i] || 0;
        const lb = cooldownMap[cat + '::' + b.i] || 0;
        return la - lb;
      });
      // Pick randomly from the bottom third (oldest used) for some variety
      const lruCount = Math.max(1, Math.ceil(sorted.length / 3));
      chooseFrom = sorted.slice(0, lruCount);
    }
    const chosen = chooseFrom[Math.floor(Math.random() * chooseFrom.length)];
    cooldownMap[cat + '::' + chosen.i] = genCount;
    picks.push(stripSuffix(chosen.p));
    pickDetails.push({ cat, pick: chosen.p, cooledOut: available.length === 0 });
  }

  if (picks.length === 0) { alert('No enabled prompts found.'); return; }

  document.getElementById('output-picks').innerHTML = pickDetails.map(p => `
    <div class="pick-row">
      <span class="pick-label">${p.cat}</span>
      ${p.cooledOut ? '<span style="font-size:10px;color:#aa7722;padding:2px 5px;background:#2a1f00;border-radius:3px;white-space:nowrap;">all cooled</span>' : ''}
      <span class="pick-text">${p.pick.substring(0,90)}${p.pick.length>90?'…':''}</span>
    </div>
  `).join('');

  const customOn = document.getElementById('custom-end-toggle').checked;
  const customText = document.getElementById('custom-end-text').value.trim();
  let final = picks.join(' ') + ' Everything else stays the same. ' + CONSISTENCY;
  if (customOn && customText) final += ' ' + customText;

  document.getElementById('output-text').value = final;
  document.getElementById('output-box').style.display = 'block';
  document.getElementById('copy-btn').textContent = 'Copy';
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('output-text').value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

    sec.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:0.75rem;flex-wrap:wrap;">
        <h3 style="flex:1;min-width:0;">${cat} <span style="font-weight:400;color:#555;font-size:11px;">${data[cat].length} prompts</span></h3>
        <button class="btn danger" onclick="deleteCategory('${cat.replace(/'/g,"\\'")}')">Delete</button>
      </div>
      ${promptsHtml}
      <hr class="divider">
      <p style="font-size:11px;color:#666;margin-bottom:6px;">Add prompts — one per line:</p>
      <div class="bulk-row">
        <textarea class="bulk-area" id="bulk-${safeId}" placeholder="Paste one or more prompts here, one per line..."></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:8px;">
        <button class="btn primary" onclick="bulkAdd('${cat.replace(/'/g,"\\'")}','${safeId}')">+ Add prompts</button>
      </div>
    `;
    el.appendChild(sec);
  });
}

function updatePrompt(cat, i, val) {
  data[cat][i] = val;
  saveState();
}

function deletePrompt(cat, i) {
  data[cat].splice(i, 1);
  const key = cat + '::' + i;
  delete disabledPrompts[key];
  saveState();
  renderEditor();
  renderCatList();
}

function bulkAdd(cat, safeId) {
  const ta = document.getElementById('bulk-' + safeId);
  const lines = ta.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) return;
  data[cat].push(...lines);
  ta.value = '';
  saveState();
  renderEditor();
  renderCatList();
  showToast(`Added ${lines.length} prompt${lines.length > 1 ? 's' : ''}`);
}

function deleteCategory(cat) {
  if (!confirm('Delete "' + cat + '" and all its prompts?')) return;
  delete data[cat];
  delete activeCategories[cat];
  Object.keys(disabledPrompts).forEach(k => { if (k.startsWith(cat + '::')) delete disabledPrompts[k]; });
  saveState();
  renderEditor();
  renderCatList();
}

function addCategory() {
  const input = document.getElementById('new-cat-name');
  const name = input.value.trim();
  if (!name || data[name]) return;
  data[name] = [];
  activeCategories[name] = true;
  input.value = '';
  saveState();
  renderEditor();
  renderCatList();
}

// ── Import / Export ───────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'promptimizer_library.json';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      Object.keys(imported).forEach(k => { data[k] = imported[k]; activeCategories[k] = true; });
      saveState();
      renderCatList();
      renderEditor();
      showToast('Imported ' + Object.keys(imported).length + ' categories');
    } catch { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
}

function saveAsHTML() {
  // Inject current data into a fresh copy of this page
  const src = document.documentElement.outerHTML;
  const updated = src.replace(
    /const DEFAULT_DATA = \{[\s\S]*?\};\n\n/,
    'const DEFAULT_DATA = ' + JSON.stringify(data, null, 2) + ';\n\n'
  );
  const blob = new Blob([updated], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'promptimizer.html';
  a.click();
  showToast('Saved as HTML');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg + ' ✓';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ──────────────────────────────────────────────────────────
loadState();
renderCatList();

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
